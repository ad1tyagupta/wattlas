name: Refresh public data snapshot

on:
  schedule:
    # The Berlin-time gate below selects exactly one of these UTC runs across DST.
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-public-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select the 04:00 Europe/Berlin run
        id: gate
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]] || [[ "$(TZ=Europe/Berlin date +%H)" == "04" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install pipeline
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install -e 'pipeline[dev]'

      - name: Refresh public snapshot
        if: steps.gate.outputs.run == 'true'
        env:
          ENTSOE_SECURITY_TOKEN: ${{ secrets.ENTSOE_SECURITY_TOKEN }}
          QLEVER_OSM_URL: https://qlever.dev/api/osm-planet
        run: make refresh

      - name: Verify pipeline and interface
        if: steps.gate.outputs.run == 'true'
        run: |
          .venv/bin/pytest -q
          npm ci --prefix web
          npm test --prefix web
          npm run build --prefix web

      - name: Publish snapshot to the repository
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name "grid-scope-data-bot"
          git config user.email "grid-scope-data-bot@users.noreply.github.com"
          git add web/public/data/latest.json web/public/data/snapshots
          if git diff --cached --quiet; then
            echo "No snapshot change to publish."
            exit 0
          fi
          git commit -m "data: refresh daily public snapshot"
          git push
